<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Документ защищён</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f5f6fa;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border:1px solid #e0e0e0;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px 36px;max-width:380px;width:100%;text-align:center;}
  .brand{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#0984e3;font-weight:600;margin-bottom:20px;}
  h1{font-family:'Unbounded',sans-serif;font-size:20px;color:#2d3436;margin-bottom:8px;font-weight:700;}
  p.s{font-size:13.5px;color:#636e72;margin-bottom:22px;}
  input{width:100%;background:#f8f9fa;border:1px solid #dfe6e9;border-radius:10px;padding:13px 15px;font-size:15px;color:#2d3436;font-family:inherit;margin-bottom:12px;transition:border-color .15s;}
  input:focus{outline:none;border-color:#0984e3;}
  button{width:100%;background:#0984e3;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,box-shadow .15s,transform .1s;}
  button:hover{background:#0770c2;box-shadow:0 4px 14px rgba(9,132,227,.28);}
  button:active{background:#065ea3;transform:translateY(1px);box-shadow:none;}
  .err{color:#d63031;font-size:13px;margin-top:12px;min-height:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Insapp &middot; Confidential</div>
  <h1>Документ защищён</h1>
  <p class="s">Введите пароль для доступа</p>
  <input type="password" id="pw" placeholder="Пароль" autofocus onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Открыть</button>
  <div class="err" id="err"></div>
</div>

      var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(SALT),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
      var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(IV)},key,b64d(CT));
      var html=new TextDecoder().decode(pt);
      document.open();
      document.write(html);
      document.close();
    }catch(e){
      document.getElementById('err').textContent='Неверный пароль';
    }
  }
</script>
